name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        # Audits only PRODUCTION (shipped) deps and fails on any high/critical,
        # EXCEPT a small documented allowlist of advisories in transitive
        # dev/build/telemetry tooling that npm classifies as "production" but
        # which is not shipped in the app (e.g. ws via Expo/Metro dev-server,
        # protobufjs via posthog->@opentelemetry). npm `overrides` won't rewrite
        # those nested workspace sub-trees and `npm audit fix` breaks @sentry, so
        # the gate lives in scripts/audit-ci.mjs (allowlist documented inline).
        # Run `npm audit --audit-level=high` (no --omit) locally to review
        # dev-tool advisories too.
        run: npm run audit:ci

      - name: Lint ratchet (mobile)
        # Phase 1 R1 / R7 — fails only on regressions vs apps/mobile/.eslint-baseline.json.
        # See apps/mobile/LINT.md.
        run: npm run lint:mobile:check

      - name: Contrast check (mobile)
        # Phase 1 R5 — WCAG contrast assertions for design-system token pairs.
        run: npm run check:contrast

      - name: Run validation suite
        run: npm run validate

      - name: Run unit tests
        # Phase 4 (error-reduction plan, completed 2026-05-25) — runs vitest
        # in every workspace that has a `test` script (core, mobile-api,
        # mobile). The mobile workspace excludes 3 collection-failing test
        # files (LeaderboardSection / HazardDetailSheet / FeedCard.champion)
        # via vitest.config.ts; ConnectivityMonitor.test.tsx skips 4 specs
        # that need the production NetInfo guard refactored to be mockable.
        # See sentryfix.md > "P3b Day 3 + mobile test rescue" for context.
        run: npm test
