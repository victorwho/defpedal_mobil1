name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint ratchet (mobile)
        # Phase 1 R1 / R7 — fails only on regressions vs apps/mobile/.eslint-baseline.json.
        # See apps/mobile/LINT.md.
        run: npm run lint:mobile:check

      - name: Contrast check (mobile)
        # Phase 1 R5 — WCAG contrast assertions for design-system token pairs.
        run: npm run check:contrast

      - name: Run validation suite
        run: npm run validate
