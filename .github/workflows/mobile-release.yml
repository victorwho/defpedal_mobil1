name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Mobile platform to build
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      auto_submit:
        description: Submit automatically after the build is created
        required: true
        default: false
        type: boolean
      native_validation_ref:
        description: Latest native validation evidence (doc path, ticket, or dated note)
        required: false
        default: ""
        type: string
      release_notes_ref:
        description: Release notes or change summary reference for preview or production rollout
        required: false
        default: ""
        type: string
      confirm_store_readiness:
        description: Confirm Expo/EAS store credentials and rollout owner are ready
        required: true
        default: false
        type: boolean

concurrency:
  group: mobile-release-${{ github.event.inputs.platform }}-${{ github.event.inputs.profile }}
  cancel-in-progress: false

jobs:
  eas-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure Expo token is configured
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "::error::Missing EXPO_TOKEN secret."
            exit 1
          fi

      - name: Release dispatch guardrails
        run: |
          PLATFORM="${{ github.event.inputs.platform }}"
          PROFILE="${{ github.event.inputs.profile }}"
          AUTO_SUBMIT="${{ github.event.inputs.auto_submit }}"
          NATIVE_VALIDATION_REF="${{ github.event.inputs.native_validation_ref }}"
          RELEASE_NOTES_REF="${{ github.event.inputs.release_notes_ref }}"
          STORE_READY="${{ github.event.inputs.confirm_store_readiness }}"

          if [ "${AUTO_SUBMIT}" = "true" ] && [ "${STORE_READY}" != "true" ]; then
            echo "::error::Auto-submit requires confirm_store_readiness=true."
            exit 1
          fi

          if [ "${PROFILE}" = "production" ] && [ -z "${RELEASE_NOTES_REF}" ]; then
            echo "::error::Production releases require release_notes_ref."
            exit 1
          fi

          if [ "${PROFILE}" = "production" ] && [ -z "${NATIVE_VALIDATION_REF}" ]; then
            echo "::error::Production releases require native_validation_ref."
            exit 1
          fi

          if [ "${PLATFORM}" = "ios" ] && [ -z "${NATIVE_VALIDATION_REF}" ]; then
            echo "::error::iOS releases require native_validation_ref until an iPhone smoke pass is documented."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate repository
        run: npm run validate

      - name: Validate mobile release configuration
        run: >
          node ./scripts/check-mobile-release.mjs
          --platform "${{ github.event.inputs.platform }}"
          --profile "${{ github.event.inputs.profile }}"
          --auto-submit "${{ github.event.inputs.auto_submit }}"
          --native-validation-ref "${{ github.event.inputs.native_validation_ref }}"
          --release-notes-ref "${{ github.event.inputs.release_notes_ref }}"
          --confirm-store-readiness "${{ github.event.inputs.confirm_store_readiness }}"

      - name: Install EAS CLI
        run: npm install --global eas-cli

      - name: Trigger EAS build
        working-directory: apps/mobile
        run: |
          AUTO_SUBMIT_FLAG=""
          if [ "${{ github.event.inputs.auto_submit }}" = "true" ]; then
            AUTO_SUBMIT_FLAG="--auto-submit"
          fi

          eas build \
            --platform "${{ github.event.inputs.platform }}" \
            --profile "${{ github.event.inputs.profile }}" \
            --non-interactive \
            --no-wait \
            ${AUTO_SUBMIT_FLAG}

      - name: Release summary
        run: |
          echo "Triggered EAS build for platform=${{ github.event.inputs.platform }} profile=${{ github.event.inputs.profile }} auto_submit=${{ github.event.inputs.auto_submit }}."
          echo "native_validation_ref=${{ github.event.inputs.native_validation_ref }}"
          echo "release_notes_ref=${{ github.event.inputs.release_notes_ref }}"
          echo "Check the EAS dashboard for build and submit progress."
